name: vmware-avi-load-balancer-serviceengine-stig-baseline
title: VMware Avi Load Balancer Service Engine STIG Readiness Guide Inspec Profile
maintainer: VMware by Broadcom
copyright: VMware by Broadcom
copyright_email: ''
license: Apache-2.0
summary: An InSpec Compliance Profile
version: 1.0.1

inputs:
- name: avicontroller
  type: string
  value: 'x.x.x.x'
  description: 'IP or FQDN of the Avi Controller'
- name: sessionCookieId
  type: string
  value: ''
  description: 'Session ID for authentication'
  sensitive: true
- name: aviversion
  type: string
  value: ''
  description: 'Avi Load Balancer version'
- name: allowed_virtual_services
  type: array
  value: []
  description: 'Enter array of allowed virtual services'
- name: ocspavailable
  type: boolean
  value: true
  description: 'Set to true if OCSP is available in the environment and should be used.'
